syntax = "proto3";

package ycc.v1;

option go_package = "github.com/whyrusleeping/ycc/proto/ycc/v1;yccv1";

// Event mirrors internal/event.Event. Data is carried as a JSON string so the
// heterogeneous per-type payload needs no proto schema churn (and matches the
// on-disk JSONL exactly).
message Event {
  int64 seq = 1;
  string ts = 2; // RFC3339
  string actor = 3;
  string type = 4;
  string data_json = 5;
}

message StartSessionRequest {
  string workspace = 1; // workspace dir; empty => daemon default
  string mode = 2; // e.g. "work"; M1 runs a single worker agent
  string interaction_level = 3; // interactive | judgement | autonomous
  string prompt = 4; // initial task prompt
}
message StartSessionResponse { string session_id = 1; }

message SubscribeRequest {
  string session_id = 1;
  int64 from_seq = 2; // replay events with seq > from_seq, then stream live
}

message SendInputRequest {
  string session_id = 1;
  string text = 2;
}
message SendInputResponse {}

message AnswerQuestionRequest {
  string session_id = 1;
  string text = 2;
  // option_index selects a suggested option from the question's options list
  // (0-based) when >= 0; otherwise text is taken as a free-text answer.
  int32 option_index = 3;
}
message AnswerQuestionResponse {}

message ListModesRequest {}
message Mode {
  string name = 1;
  string title = 2;
  string description = 3;
}
// Preset is a home-menu entry that starts a session in `mode` with a tailored
// `opening_prompt`. The pm mode exposes the old spec/backlog/feature/bug framings
// this way — one mode, four opening prompts (spec §9).
message Preset {
  string name = 1;        // menu key, distinct from the mode
  string title = 2;
  string description = 3;
  string mode = 4;        // session mode to start (e.g. "pm")
  string opening_prompt = 5; // verbatim first prompt seeded into the session
}
message ListModesResponse {
  repeated Mode modes = 1;
  repeated Preset presets = 2;
}

message ListSessionsRequest {}
message SessionInfo {
  string session_id = 1;
  string mode = 2;
  string status = 3; // running | idle | error
  string workspace = 4;
}
message ListSessionsResponse { repeated SessionInfo sessions = 1; }

// ListModels enumerates the configured logical models (spec §13) so the settings
// overlay can populate the per-role pickers.
message ListModelsRequest {}
message ModelInfo {
  string name = 1;    // logical name (e.g. "claude", "gpt")
  string backend = 2; // anthropic | openai | ollama | ...
  string model = 3;   // backend model id
}
message ListModelsResponse { repeated ModelInfo models = 1; }

// SetInteractionLevel changes a session's interaction level mid-flight (spec §11,
// §18.2). It takes effect at the next gate and is recorded in the event log.
message SetInteractionLevelRequest {
  string session_id = 1;
  string level = 2; // interactive | judgement | autonomous
}
message SetInteractionLevelResponse {}

// SetRoleConfig reassigns per-role logical models mid-session (spec §13, §18.2).
// Empty coordinator/implementer leaves that role unchanged; an empty reviewers
// list leaves reviewers unchanged.
message SetRoleConfigRequest {
  string session_id = 1;
  string coordinator = 2;
  string implementer = 3;
  repeated string reviewers = 4;
}
message SetRoleConfigResponse {}

// SetThinking changes a session-wide thinking/effort level mid-session (spec
// §18.2). The override applies to every agent in the session (coordinator +
// spawned subagents) and takes precedence over the per-model config until
// changed. Levels: off | low | medium | high | xhigh | max.
message SetThinkingRequest {
  string session_id = 1;
  string level = 2; // off | low | medium | high | xhigh | max
}
message SetThinkingResponse {}

// SessionService is the daemon's RPC surface (spec §12). M1 implements the core
// four; mode/question RPCs arrive in later milestones.
service SessionService {
  rpc ListModes(ListModesRequest) returns (ListModesResponse);
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc Subscribe(SubscribeRequest) returns (stream Event);
  rpc SendInput(SendInputRequest) returns (SendInputResponse);
  rpc AnswerQuestion(AnswerQuestionRequest) returns (AnswerQuestionResponse);

  // Settings overlay (spec §18.2): enumerate models and change a session's
  // interaction level / per-role model assignment mid-flight.
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc SetInteractionLevel(SetInteractionLevelRequest) returns (SetInteractionLevelResponse);
  rpc SetRoleConfig(SetRoleConfigRequest) returns (SetRoleConfigResponse);
  rpc SetThinking(SetThinkingRequest) returns (SetThinkingResponse);
}
