syntax = "proto3";

package ycc.v1;

option go_package = "github.com/whyrusleeping/ycc/proto/ycc/v1;yccv1";

// Event mirrors internal/event.Event. Data is carried as a JSON string so the
// heterogeneous per-type payload needs no proto schema churn (and matches the
// on-disk JSONL exactly).
message Event {
  int64 seq = 1;
  string ts = 2; // RFC3339
  string actor = 3;
  string type = 4;
  string data_json = 5;
  bool transient = 6; // broadcast-only, never persisted; seq is 0 (task 0114)
}

message StartSessionRequest {
  string workspace = 1; // workspace dir; empty => daemon default
  string mode = 2; // e.g. "work"; M1 runs a single worker agent
  string interaction_level = 3; // interactive | judgement | autonomous
  string prompt = 4; // initial task prompt
  // project is an optional registered project name; when set it resolves to that
  // project's workspace (overriding `workspace`). Spec §3.1.
  string project = 5;
}
message StartSessionResponse { string session_id = 1; }

// Projects — persistent multi-project daemon (spec §3.1). A project is a named
// workspace; the daemon's registry maps name -> path in its state dir.
message ProjectInfo {
  string name = 1;
  string path = 2;
}
message ListProjectsRequest {}
message ListProjectsResponse { repeated ProjectInfo projects = 1; }
message AddProjectRequest {
  string path = 1; // workspace dir to register
  string name = 2; // optional; derived from the dir basename when empty
}
message AddProjectResponse { ProjectInfo project = 1; }
message RemoveProjectRequest { string name = 1; }
message RemoveProjectResponse {}

message SubscribeRequest {
  string session_id = 1;
  int64 from_seq = 2; // replay events with seq > from_seq, then stream live
}

message SendInputRequest {
  string session_id = 1;
  string text = 2;
}
message SendInputResponse {}

message AnswerQuestionRequest {
  string session_id = 1;
  string text = 2;
  // option_index selects a suggested option from the question's options list
  // (0-based) when >= 0; otherwise text is taken as a free-text answer.
  int32 option_index = 3;
}
message AnswerQuestionResponse {}

// QuestionAnswer is one answer in a batch reply to a multi-question ask_user
// call. option_index selects a suggested option from that question's options
// list (0-based) when >= 0; otherwise text is taken as a free-text answer.
message QuestionAnswer {
  string text = 1;
  int32 option_index = 2;
}

// AnswerQuestions replies to a batch of questions posed in a single ask_user
// call. The answers are positional: answers[i] answers the i-th question.
message AnswerQuestionsRequest {
  string session_id = 1;
  repeated QuestionAnswer answers = 2;
}
message AnswerQuestionsResponse {}

// Interrupt requests a graceful pause-to-steer of a running session (spec
// §18.7): it pauses at the next safe checkpoint without aborting a tool.
message InterruptRequest { string session_id = 1; }
message InterruptResponse {}
// Resume continues a paused session (optionally after SendInput corrections).
message ResumeRequest { string session_id = 1; }
message ResumeResponse {}
// StopSession hard-terminates a session (spec §12): it cancels the agent loop,
// closes the event log, and removes the session from the daemon. Distinct from
// Interrupt's graceful pause/steer (spec §18.7) — there is no resume.
message StopSessionRequest { string session_id = 1; }
message StopSessionResponse {}
// ResumeSession re-opens a persisted (finished/idle) session on its EXISTING
// event log ("resume = replay", spec §4.5/§18.6): its coordinator is
// re-instantiated with history reconstructed from the log and new activity
// appends to the same continuous events.jsonl. Idempotent if already live.
message ResumeSessionRequest {
  string session_id = 1;
  string project = 2;
}
message ResumeSessionResponse {
  string session_id = 1;
  string mode = 2;
  string status = 3;
  string workspace = 4;
}

message ListModesRequest {}
message Mode {
  string name = 1;
  string title = 2;
  string description = 3;
}
// Preset is a home-menu entry that starts a session in `mode` with a tailored
// `opening_prompt`. The pm mode exposes the old spec/backlog/feature/bug framings
// this way — one mode, four opening prompts (spec §9).
message Preset {
  string name = 1;        // menu key, distinct from the mode
  string title = 2;
  string description = 3;
  string mode = 4;        // session mode to start (e.g. "pm")
  string opening_prompt = 5; // verbatim first prompt seeded into the session
}
message ListModesResponse {
  repeated Mode modes = 1;
  repeated Preset presets = 2;
}

message ListSessionsRequest {
  string project = 1; // optional: filter to sessions in this project's workspace
}
message SessionInfo {
  string session_id = 1;
  string mode = 2;
  string status = 3; // running | idle | error
  string workspace = 4;
}
message ListSessionsResponse { repeated SessionInfo sessions = 1; }

message ListSessionHistoryRequest {
  string project = 1; // optional registered project; empty => daemon default workspace
}
message SessionSummary {
  string session_id = 1;
  string mode = 2;
  string status = 3;        // running | idle | error | paused | stopped
  string workspace = 4;
  string title = 5;         // derived from the first user prompt
  string started_at = 6;    // RFC3339
  string last_activity = 7; // RFC3339
  repeated string focus_tasks = 8;
  int64 turns = 9;
  int64 tool_calls = 10;
  bool live = 11;
  // waiting_input is true when a live session is blocked on an unanswered
  // ask_user question (single or batch) and needs the user to reply. Only ever
  // set on live rows — a persisted-only session holds no in-memory question.
  bool waiting_input = 12;
}
message ListSessionHistoryResponse { repeated SessionSummary sessions = 1; }

// GetSessionTranscript returns the full event log for a session — live or
// persisted on disk — so the session browser can render a read-only replayed
// transcript with the same event components as the live view (spec §18.6).
message GetSessionTranscriptRequest {
  string project = 1;    // optional registered project; empty => daemon default workspace
  string session_id = 2;
}
message GetSessionTranscriptResponse { repeated Event events = 1; }

// GetCommitDiff returns the `git show` output (stat + patch) for a commit, so the
// transcript can drill into what an agent actually committed (task 0140). The
// daemon caps the returned diff to bound the wire payload; truncated reports when
// the cap was hit so the client can render a truncation notice.
message GetCommitDiffRequest {
  string project = 1; // optional registered project; empty => daemon default workspace
  string sha = 2;     // bare hex commit sha (from a commit_made event)
}
message GetCommitDiffResponse {
  string diff = 1;
  bool truncated = 2;
}

// ListModels enumerates the configured logical models (spec §13) so the settings
// overlay can populate the per-role pickers.
message ListModelsRequest {}
message ModelInfo {
  string name = 1;    // logical name (e.g. "claude", "gpt")
  string backend = 2; // anthropic | openai | ollama | ...
  string model = 3;   // backend model id
  // Per-model pricing ($/Mtok) surfaced so the live session status bar can price
  // running usage (spec §20.4). The price_* fields are optional so an unset rate
  // is distinguishable from an explicit 0.0; priced reports whether ANY rate is
  // configured (mirrors config.Pricing.Configured) so unpriced models render
  // tokens-only without inventing a cost.
  optional double price_input = 4;
  optional double price_output = 5;
  optional double price_cache_read = 6;
  optional double price_cache_write = 7;
  bool priced = 8;
}
message ListModelsResponse {
  repeated ModelInfo models = 1;
  // Current default per-role assignment (config.Roles) so the settings overlay can
  // seed its per-role pickers with the ACTUAL current selection — even when opened
  // from the home menu with no live session (spec §18.2).
  string coordinator = 2;
  string implementer = 3;
  repeated string reviewers = 4;
  // Current default per-role thinking level (roles.thinking.*, resolved to the
  // package default when unset) so the overlay seeds its thinking pickers too.
  string coordinator_thinking = 5;
  string implementer_thinking = 6;
  string reviewers_thinking = 7;
}

// ModelConfig mirrors a [models.X] block (spec §13, §18.2) for the settings
// overlay's add/edit/remove of model backends. Keys are referenced via key_env
// only — no secret values cross the wire. The pricing fields are optional so an
// unset price is distinguishable from an explicit 0.0.
message ModelConfig {
  string name = 1;             // logical name (e.g. "claude", "gpt")
  string backend = 2;          // anthropic | openai | openai-compatible | glm | ollama
  string base_url = 3;
  string model = 4;            // backend model id
  string key_env = 5;          // env var holding the API key (never the key itself)
  string thinking = 6;         // adaptive | off | ""
  string effort = 7;           // low | medium | high | xhigh | max
  string thinking_display = 8; // summarized | omitted
  optional double price_input = 9;
  optional double price_output = 10;
  optional double price_cache_read = 11;
  optional double price_cache_write = 12;
}

// UpsertModel adds or replaces a logical model backend (spec §18.2). The change
// takes effect on the next turn/spawn; persist=true also writes ycc.toml.
message UpsertModelRequest {
  ModelConfig model = 1;
  bool persist = 2;
}
message UpsertModelResponse {}

// RemoveModel deletes a logical model backend. Rejected if a role still
// references it. persist=true also writes ycc.toml.
message RemoveModelRequest {
  string name = 1;
  bool persist = 2;
}
message RemoveModelResponse {}

// GetModelConfig returns a model backend's full record for editing.
message GetModelConfigRequest { string name = 1; }
message GetModelConfigResponse { ModelConfig model = 1; }

// DiscoverModels lists the model ids available from a backend connection (spec
// §13) so the connection form can offer them for selection. base_url + key_env
// describe the connection to probe (the key value never crosses the wire — the
// daemon resolves key_env locally). On a discovery failure the daemon falls back
// to curated defaults and sets from_network=false with a human-readable note.
message DiscoverModelsRequest {
  string backend = 1;  // anthropic | openai | openai-compatible | glm | ollama
  string base_url = 2;
  string key_env = 3;  // env var holding the API key (never the key itself)
}
message DiscoverModelsResponse {
  repeated string model_ids = 1;
  bool from_network = 2; // true => queried the backend; false => curated fallback
  string note = 3;       // human-readable status/error (e.g. why fallback happened)
}


// SetInteractionLevel changes a session's interaction level mid-flight (spec §11,
// §18.2). It takes effect at the next gate and is recorded in the event log.
message SetInteractionLevelRequest {
  string session_id = 1;
  string level = 2; // interactive | judgement | autonomous
}
message SetInteractionLevelResponse {}

// SetRoleConfig reassigns per-role logical models (spec §13, §18.2). Empty
// coordinator/implementer leaves that role unchanged; an empty reviewers list
// leaves reviewers unchanged. The assignment is persisted as the default (roles
// in ycc.toml) so it survives a restart. When session_id names a live session the
// change also applies to it immediately; an empty/unknown session_id just updates
// the persisted default (e.g. changed from the home menu with no session).
message SetRoleConfigRequest {
  string session_id = 1;
  string coordinator = 2;
  string implementer = 3;
  repeated string reviewers = 4;
}
message SetRoleConfigResponse {}

// SetThinking changes a thinking/effort level (spec §7.4, §18.2). The override
// applies per role (empty role = all roles) and is persisted as the default
// (roles.thinking.* in ycc.toml) so it survives a restart. When session_id names
// a live session the change also applies to it immediately; an empty/unknown
// session_id just updates the persisted default (e.g. changed from the home menu).
// Levels: off | low | medium | high | xhigh | max.
message SetThinkingRequest {
  string session_id = 1;
  string level = 2; // off | low | medium | high | xhigh | max
  string role = 3;  // empty = all roles; coordinator | implementer | reviewers
}
message SetThinkingResponse {}

// Backlog browser (spec §18.5): read-only RPCs that expose the durable backlog
// (internal/docs Store) so clients can list and inspect tasks independent of any
// agent session.
message ListBacklogRequest {
  string project = 1; // optional registered project; empty => daemon default workspace
}
message BacklogTaskSummary {
  string id = 1;
  string title = 2;
  string status = 3;
  int32 priority = 4;
  repeated string depends_on = 5;
  bool ready = 6;              // true when no dependency is blocking
  repeated string blocked_by = 7; // ids of not-yet-done dependencies
}
message ListBacklogResponse { repeated BacklogTaskSummary tasks = 1; }
message GetTaskRequest {
  string project = 1; // optional registered project; empty => daemon default workspace
  string id = 2;
}
message TaskDetail {
  string id = 1;
  string title = 2;
  string status = 3;
  int32 priority = 4;
  repeated string depends_on = 5;
  repeated string spec_refs = 6;
  string created = 7;
  string updated = 8;
  string body = 9; // markdown: description, acceptance criteria, work log
  bool ready = 10;
  repeated string blocked_by = 11;
  string path = 12; // absolute task file path; lets a local client open it in $EDITOR
}
message GetTaskResponse { TaskDetail task = 1; }

// Backlog grooming (spec §18.5, task 0099): direct mutation of a task from the
// browser. Unset optional fields are left untouched; a request with NO mutation
// fields set is a valid "refresh" that re-reads the task file (used after
// hand-edits in $EDITOR).
message UpdateTaskRequest {
  string project = 1;       // optional registered project; empty => daemon default workspace
  string id = 2;
  optional string status = 3;   // todo | in_progress | in_review | done | blocked
  optional int32 priority = 4;  // 1..5
  optional string title = 5;
}
message UpdateTaskResponse { TaskDetail task = 1; }

// Plan library (reusable runbooks, task 0020/0077): read-only access to the
// in-repo plans/*.md so clients can browse and view saved plans.
message ListPlansRequest { string project = 1; }
message PlanSummary {
  string name = 1;  // file name without .md (the invocation key)
  string title = 2; // first markdown heading, else name
  string path = 3;  // absolute path
}
message ListPlansResponse { repeated PlanSummary plans = 1; }
message GetPlanRequest {
  string project = 1;
  string name = 2;
}
message GetPlanResponse {
  string name = 1;
  string title = 2;
  string content = 3;
}

// Quick-add backlog capture (spec §18.2, task 0016): a TUI overlay lets the user
// quick-add a backlog item mid-session WITHOUT disturbing the running session.
// The daemon runs a lightweight, off-stream capture agent that turns the
// description into a structured task via create_task. The agent may ask ONE
// clarifying question; the client carries it back via prior_question/prior_answer
// so the second call creates the task without asking again.
message CaptureBacklogItemRequest {
  string project = 1;        // optional registered project; empty => daemon default workspace
  string description = 2;    // the user's natural-language description
  string prior_question = 3; // the clarifying question the agent asked previously (if any)
  string prior_answer = 4;   // the user's answer to that question
}

// Usage/cost breakdown (spec §20.3, §20.5): the daemon scans a workspace's
// session event logs, joins per-turn usage with task focus and per-model
// pricing, and returns a structured breakdown grouped by task × model × day so
// non-CLI clients (TUI/phone) can render it identically to `ycc cost`.
message GetUsageRequest {
  string project = 1;           // optional registered project; empty => daemon default workspace
  repeated string group_by = 2; // task | model | session | agent | day (default: task)
  string since = 3;             // YYYY-MM-DD inclusive, optional
  string until = 4;             // YYYY-MM-DD inclusive, optional
}
message UsageRow {
  string task = 1;
  string model = 2;
  string session = 3;
  string day = 4;
  int64 input = 5;
  int64 output = 6;
  int64 cache_read = 7;
  int64 cache_write = 8;
  int64 total = 9;
  double cost = 10;
  string price_status = 11; // priced | unpriced | partial
  string agent = 12;        // coordinator | implementer | reviewer (collapsed role)
}
message GetUsageResponse {
  repeated UsageRow rows = 1;
  UsageRow total = 2;
  string workspace = 3;
}

// Spend guard budget caps (task 0137, spec §20.6). GetBudget returns the
// configured session and loop caps so the TUI work-loop driver can enforce the
// per-loop-run cap client-side (session caps are enforced daemon-side). Every
// field is 0 when unset (unlimited); a cost cap is in US dollars, a token cap
// counts total tokens.
message GetBudgetRequest {}
message GetBudgetResponse {
  double session_cost = 1;  // $ cap per session (0 = unlimited)
  int64 session_tokens = 2; // total-token cap per session (0 = unlimited)
  double loop_cost = 3;     // $ cap per work-loop run (0 = unlimited)
  int64 loop_tokens = 4;    // total-token cap per work-loop run (0 = unlimited)
}

// Parallel workstreams (docs/design/parallel-workstreams.md §5–§8): a workstream
// is a linked git worktree + branch plus the `work` session scoped to it, tracked
// as a child of a project. WorkstreamInfo mirrors workstream.Workstream.
message WorkstreamInfo {
  string id = 1;            // stable short id (ws_<8-hex>)
  string project = 2;       // parent project NAME
  string base_commit = 3;   // commit the branch was created from
  string branch = 4;        // worktree branch ref (ycc/ws/<id>[-<task>])
  string worktree_path = 5; // absolute worktree directory
  string session_id = 6;    // session scoped to the worktree (Subscribe target)
  string task_id = 7;       // optional backlog task this workstream targets
  string status = 8;        // active | merged | discarded | stale
  string created_at = 9;    // RFC3339
  int64 commit_count = 10;  // commits on the branch since base_commit (0 if unknown)
  string session_status = 11; // live session status: running|idle|paused|stopped|error (empty if unknown)
}

// SpawnWorkstream creates a worktree + branch off the project's base and starts a
// `work` session inside it (design §5, §8). The session_id for Subscribe rides
// inside the returned WorkstreamInfo.
message SpawnWorkstreamRequest {
  string project = 1;           // parent project name (required)
  string base_ref = 2;          // ref/commit to branch from; empty => HEAD
  string task_id = 3;           // optional backlog task id (appended to branch)
  string prompt = 4;            // optional initial prompt for the session
  string interaction_level = 5; // interactive | judgement | autonomous (default judgement)
}
message SpawnWorkstreamResponse { WorkstreamInfo workstream = 1; }

// ListWorkstreams returns the workstreams for a project (empty project => all).
message ListWorkstreamsRequest { string project = 1; }
message ListWorkstreamsResponse { repeated WorkstreamInfo workstreams = 1; }

// PreviewMerge trial-merges a workstream's branch into its project's current base
// WITHOUT mutating anything (design §6 step 1): clean reports whether the merge
// applies without conflict, conflicts lists the conflicted paths otherwise, and
// diff holds the integrated diff preview when clean.
message PreviewMergeRequest { string workstream_id = 1; }
message PreviewMergeResponse {
  bool clean = 1;
  repeated string conflicts = 2;
  string diff = 3;
}

// MergeWorkstream integrates a workstream's branch back to base with the
// conflict-aware, review-gated flow (design §6). The design §8 sketch calls the
// second field "strategy", but that sketch is explicitly non-final; the manager's
// real gate is `accept`: under interactive/judgement a clean trial merge returns
// needs_accept + the integrated diff (nothing mutated) until accept=true, while
// autonomous integrates clean merges immediately. A conflict returns the
// conflicted paths with base untouched and the worktree kept.
message MergeWorkstreamRequest {
  string workstream_id = 1;
  bool accept = 2; // accept a review-gated clean merge (design §6 step 2)
}
message MergeWorkstreamResponse {
  bool merged = 1;            // branch integrated (commit holds the merge sha)
  string commit = 2;
  bool needs_accept = 3;      // clean but gated: review diff, then re-call accept=true
  string diff = 4;            // integrated diff when needs_accept
  repeated string conflicts = 5; // conflicted paths when the merge conflicted
}

// DiscardWorkstream abandons a workstream without merging: it stops the session,
// cleans up the worktree + branch, and marks the registry entry discarded
// (design §6).
message DiscardWorkstreamRequest { string workstream_id = 1; }
message DiscardWorkstreamResponse {}

// SessionService is the daemon's RPC surface (spec §12). M1 implements the core
// four; mode/question RPCs arrive in later milestones.
service SessionService {
  rpc ListModes(ListModesRequest) returns (ListModesResponse);
  rpc StartSession(StartSessionRequest) returns (StartSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  // ListSessionHistory enumerates all sessions for a project (live + persisted
  // on-disk logs), most-recent first (spec §18.6). ListSessions stays live-only.
  rpc ListSessionHistory(ListSessionHistoryRequest) returns (ListSessionHistoryResponse);
  // GetSessionTranscript returns a session's full event log (live or persisted)
  // for the read-only transcript drill-in (spec §18.6).
  rpc GetSessionTranscript(GetSessionTranscriptRequest) returns (GetSessionTranscriptResponse);
  // GetCommitDiff returns a commit's `git show` diff so the transcript can drill
  // into what an agent committed from a commit_made row (task 0140, spec §18.6).
  rpc GetCommitDiff(GetCommitDiffRequest) returns (GetCommitDiffResponse);
  rpc Subscribe(SubscribeRequest) returns (stream Event);
  rpc SendInput(SendInputRequest) returns (SendInputResponse);
  rpc AnswerQuestion(AnswerQuestionRequest) returns (AnswerQuestionResponse);
  // AnswerQuestions replies to a batch of questions posed in one ask_user call.
  rpc AnswerQuestions(AnswerQuestionsRequest) returns (AnswerQuestionsResponse);

  // Interrupt & steer (spec §18.7): gracefully pause a running session at its
  // next safe checkpoint, then continue the same loop (optionally after a
  // steered SendInput correction). Distinct from the hard Stop/terminate.
  rpc Interrupt(InterruptRequest) returns (InterruptResponse);
  rpc Resume(ResumeRequest) returns (ResumeResponse);

  // StopSession hard-terminates a session: cancels its agent loop, closes its
  // event log, and removes it from the daemon (no resume). Distinct from
  // Interrupt's graceful pause (spec §12, §18.7).
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);

  // ResumeSession re-opens a persisted session on its existing event log
  // (reconstructs loop history; "resume = replay", spec §4.5/§18.6). Idempotent
  // if the session is already live.
  rpc ResumeSession(ResumeSessionRequest) returns (ResumeSessionResponse);

  // Projects — persistent multi-project daemon (spec §3.1).
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc AddProject(AddProjectRequest) returns (AddProjectResponse);
  rpc RemoveProject(RemoveProjectRequest) returns (RemoveProjectResponse);

  // Settings overlay (spec §18.2): enumerate models and change a session's
  // interaction level / per-role model assignment mid-flight.
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc SetInteractionLevel(SetInteractionLevelRequest) returns (SetInteractionLevelResponse);
  rpc SetRoleConfig(SetRoleConfigRequest) returns (SetRoleConfigResponse);
  rpc SetThinking(SetThinkingRequest) returns (SetThinkingResponse);

  // Model backends (spec §18.2): add/edit/remove a logical model backend at
  // runtime; optionally persisted to ycc.toml.
  rpc UpsertModel(UpsertModelRequest) returns (UpsertModelResponse);
  rpc RemoveModel(RemoveModelRequest) returns (RemoveModelResponse);
  rpc GetModelConfig(GetModelConfigRequest) returns (GetModelConfigResponse);
  rpc DiscoverModels(DiscoverModelsRequest) returns (DiscoverModelsResponse);

  // Backlog browser (spec §18.5): read-only access to the durable backlog.
  rpc ListBacklog(ListBacklogRequest) returns (ListBacklogResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  // UpdateTask grooms a backlog task in place (spec §18.5, task 0099): change
  // status/priority/title, or (no mutation fields) refresh + regenerate the index.
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  // Plan library (reusable runbooks, task 0020/0077): read-only access to the
  // in-repo plans/*.md so clients can browse and view saved plans.
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse);
  rpc GetPlan(GetPlanRequest) returns (GetPlanResponse);

  // Quick-add backlog capture (spec §18.2, task 0016): run a lightweight,
  // off-stream capture agent that turns a natural-language description into a
  // backlog task without disturbing the running session. May ask ONE clarifying
  // question, carried back via prior_question/prior_answer.
  //
  // Streams the capture agent's action log (the same Event stream as Subscribe)
  // so the client can show live progress, ending with a terminal
  // `capture_result` event whose data_json carries {task_id,title,question} on
  // success (or {error} on failure).
  rpc CaptureBacklogItem(CaptureBacklogItemRequest) returns (stream Event);

  // Usage/cost breakdown (spec §20): aggregated, priced token usage by task ×
  // model × day so clients can render the cost breakdown.
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);

  // Spend guard (task 0137, spec §20.6): return the configured budget caps so the
  // TUI work-loop driver can enforce the per-loop-run cap client-side.
  rpc GetBudget(GetBudgetRequest) returns (GetBudgetResponse);

  // Parallel workstreams (docs/design/parallel-workstreams.md §6, §8): spawn a
  // worktree+session, list them, preview/merge a branch back to base with the
  // conflict-aware review gate, or discard one. Subscribe(session_id) is reused
  // verbatim for per-workstream event streaming (the session_id rides inside
  // WorkstreamInfo).
  rpc SpawnWorkstream(SpawnWorkstreamRequest) returns (SpawnWorkstreamResponse);
  rpc ListWorkstreams(ListWorkstreamsRequest) returns (ListWorkstreamsResponse);
  rpc PreviewMerge(PreviewMergeRequest) returns (PreviewMergeResponse);
  rpc MergeWorkstream(MergeWorkstreamRequest) returns (MergeWorkstreamResponse);
  rpc DiscardWorkstream(DiscardWorkstreamRequest) returns (DiscardWorkstreamResponse);
}
