# XcodeGen manifest for the ycc iPhone app.
#
# Regenerate the (git-ignored) .xcodeproj with:  xcodegen generate
# Build for a simulator with:
#   xcodebuild -project Ycc.xcodeproj -scheme Ycc \
#     -destination 'generic/platform=iOS Simulator' build
#
# All non-UI logic lives in the local YccKit SPM package; the app target here is
# a thin SwiftUI shell. See docs/design/ios-client.md §3/§5.

name: Ycc
options:
  bundleIdPrefix: dev.ycc
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  YccKit:
    path: YccKit

targets:
  Ycc:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
    dependencies:
      - package: YccKit
        product: YccKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ycc.Ycc
        # iPhone-only (1); no iPad/universal layouts (design §2 non-goals).
        TARGETED_DEVICE_FAMILY: 1
        # The app MUST be signed even for the simulator: an unsigned app has no
        # application-identifier entitlement, so Keychain access fails with
        # errSecMissingEntitlement (-34018) — the "KeychainError error 0" bug.
        # Ad-hoc "Sign to Run Locally" (identity "-") needs no team/account, so
        # CI/agent simulator builds stay simple while getting a keychain-capable
        # app.
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ycc
        UILaunchScreen: {}
        # Custom URL scheme for deep links (task 0186): ycc://session/<id> and
        # ycc://project/<name>. ntfy notifications set a Click header of
        # ycc://session/<id> so a tap opens the app straight on that session.
        CFBundleURLTypes:
          - CFBundleURLName: dev.ycc.deeplink
            CFBundleURLSchemes:
              - ycc
        # Transport security: the intended deployment is a tailnet where http://
        # is acceptable (spec §14, design §5 "Transport security"). Allow
        # insecure loads so a plain-http tailnet daemon works; https:// daemons
        # are unaffected and recommended off-tailnet.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

  # Hosted test bundle: runs inside the Ycc app on the simulator via `xcodebuild
  # test`, inheriting the app's signed application-identifier entitlement so it
  # can exercise the real Keychain path that plain `swift test` cannot. It does
  # NOT link the YccKit package product itself (that would double-link the
  # SwiftProtobuf transitive dep); the host app provides YccKit at runtime.
  YccAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Tests/YccAppTests
    dependencies:
      - target: Ycc
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ycc.YccAppTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic

schemes:
  Ycc:
    build:
      targets:
        Ycc: all
    test:
      targets:
        - YccAppTests
